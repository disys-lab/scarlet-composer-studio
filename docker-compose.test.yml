version: '3.8'
services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: redis-server --requirepass testpassword
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "testpassword", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mock-manager:
    build:
      context: tests/mock_manager
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
